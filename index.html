<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Pixolyze \u2013 Professional photo editing, graphic design, branding, and social media content creation for brands & creators."/>
<meta name="keywords" content="photo editing, graphic design, branding, social media content, Pixolyze"/>
<title>Pixolyze \u2013 Transforming Pixels into Perfection</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --violet: #7c3aed;
    --indigo: #4f46e5;
    --electric: #a855f7;
    --glow: #c084fc;
    --blue: #3b82f6;
    --cyan: #06b6d4;
    --dark: #070712;
    --dark2: #0d0d1a;
    --dark3: #111128;
    --surface: #16163a;
    --light: #f8f7ff;
    --muted: #a09ec7;
    --border: rgba(124,58,237,0.2);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--light);
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor { position:fixed; width:12px; height:12px; background:var(--electric); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform .1s, background .2s; mix-blend-mode:screen; }
  .cursor-ring { position:fixed; width:36px; height:36px; border:1.5px solid var(--electric); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:all .18s cubic-bezier(.25,.46,.45,.94); opacity:.6; }
  body:has(a:hover) .cursor-ring, body:has(button:hover) .cursor-ring { width:52px; height:52px; border-color:var(--glow); opacity:1; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--dark); }
  ::-webkit-scrollbar-thumb { background:linear-gradient(var(--violet),var(--blue)); border-radius:2px; }

  /* NAV */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 60px;
    background: rgba(7,7,18,0); backdrop-filter:blur(0px);
    transition: background .4s, backdrop-filter .4s, padding .4s;
  }
  nav.scrolled { background:rgba(7,7,18,.85); backdrop-filter:blur(20px); padding:14px 60px; border-bottom:1px solid var(--border); }
  .nav-logo { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; background:linear-gradient(135deg,var(--electric),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-.02em; }
  .nav-links { display:flex; gap:36px; list-style:none; }
  .nav-links a { color:var(--muted); text-decoration:none; font-size:.875rem; font-weight:500; letter-spacing:.03em; transition:color .2s; }
  .nav-links a:hover { color:var(--light); }
  .nav-cta { background:linear-gradient(135deg,var(--violet),var(--blue)); color:#fff; border:none; padding:10px 24px; border-radius:100px; font-family:'DM Sans',sans-serif; font-size:.875rem; font-weight:500; cursor:none; transition:opacity .2s, transform .2s, box-shadow .2s; box-shadow:0 0 20px rgba(124,58,237,.3); }
  .nav-cta:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 0 30px rgba(124,58,237,.5); }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:none; }
  .hamburger span { width:24px; height:2px; background:var(--light); border-radius:2px; transition:.3s; }

  /* HERO */
  #hero {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; padding:120px 60px 80px;
    text-align:center;
  }

  .hero-bg {
    position:absolute; inset:0; z-index:0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,.25) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(59,130,246,.2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 70%, rgba(6,182,212,.12) 0%, transparent 60%),
                var(--dark);
  }

  .hero-grid {
    position:absolute; inset:0; z-index:0;
    background-image: linear-gradient(rgba(124,58,237,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,.06) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
  }

  .blob { position:absolute; border-radius:50%; filter:blur(80px); z-index:0; animation:blobFloat 8s ease-in-out infinite; }
  .blob1 { width:500px; height:500px; background:rgba(124,58,237,.15); top:-100px; left:-100px; animation-delay:0s; }
  .blob2 { width:400px; height:400px; background:rgba(59,130,246,.12); bottom:-80px; right:-80px; animation-delay:-3s; }
  .blob3 { width:300px; height:300px; background:rgba(6,182,212,.1); top:40%; left:60%; animation-delay:-5s; }

  @keyframes blobFloat {
    0%,100% { transform:translate(0,0) scale(1); }
    33% { transform:translate(30px,-20px) scale(1.05); }
    66% { transform:translate(-20px,15px) scale(.97); }
  }

  .hero-content { position:relative; z-index:1; max-width:860px; }

  .hero-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(124,58,237,.12); border:1px solid rgba(124,58,237,.3);
    color:var(--glow); padding:7px 18px; border-radius:100px;
    font-size:.78rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
    margin-bottom:32px;
    animation: fadeUp .8s ease both;
  }
  .hero-badge::before { content:''; width:6px; height:6px; background:var(--electric); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)} }

  .hero-h1 {
    font-family:'Syne',sans-serif; font-size:clamp(2.8rem,6vw,5.5rem); font-weight:800;
    line-height:1.06; letter-spacing:-.03em; margin-bottom:24px;
    animation: fadeUp .8s .15s ease both;
  }
  .hero-h1 .grad { background:linear-gradient(135deg,#a855f7,#3b82f6,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

  .hero-sub {
    font-size:clamp(1rem,2vw,1.2rem); color:var(--muted); max-width:540px; margin:0 auto 48px; line-height:1.7; font-weight:300;
    animation: fadeUp .8s .3s ease both;
  }

  .hero-btns { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; animation: fadeUp .8s .45s ease both; }
  .btn-primary {
    background:linear-gradient(135deg,var(--violet),var(--blue)); color:#fff;
    padding:15px 36px; border-radius:100px; font-weight:500; font-size:1rem;
    border:none; cursor:none; transition:transform .2s, box-shadow .2s;
    box-shadow:0 0 40px rgba(124,58,237,.4);
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 0 60px rgba(124,58,237,.6); }
  .btn-outline {
    background:transparent; color:var(--light); border:1px solid rgba(255,255,255,.2);
    padding:15px 36px; border-radius:100px; font-weight:400; font-size:1rem;
    cursor:none; transition:border-color .2s, background .2s;
  }
  .btn-outline:hover { border-color:var(--electric); background:rgba(168,85,247,.08); }

  .hero-scroll {
    position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    color:var(--muted); font-size:.75rem; letter-spacing:.1em; text-transform:uppercase;
    animation: fadeUp .8s .8s ease both;
  }
  .scroll-line { width:1px; height:50px; background:linear-gradient(var(--electric),transparent); animation:scrollAnim 2s ease infinite; }
  @keyframes scrollAnim { 0%{opacity:0;transform:scaleY(0);transform-origin:top} 50%{opacity:1;transform:scaleY(1)} 100%{opacity:0;transform:scaleY(1);transform-origin:bottom} }

  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }

  /* SECTION BASE */
  section { padding:100px 60px; }
  .section-label {
    display:inline-block; font-size:.72rem; font-weight:600; letter-spacing:.15em;
    text-transform:uppercase; color:var(--electric); margin-bottom:16px;
  }

    font-family:'
